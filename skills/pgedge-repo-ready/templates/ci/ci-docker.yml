name: CI - Docker

on:
  push:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - "Dockerfile*"
      - "docker/**"
      - ".github/workflows/ci-docker.yml"
  pull_request:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - "Dockerfile*"
      - "docker/**"
      - ".github/workflows/ci-docker.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for healthy services
        run: |
          echo "Waiting for services to be healthy..."
          timeout 120 bash -c '
            until docker compose ps --format json \
              | python3 -c "
            import sys, json
            services = [json.loads(l) for l in sys.stdin]
            healthy = all(
              s.get(\"Health\",\"\") == \"healthy\"
              or s.get(\"State\",\"\") == \"running\"
              for s in services
            )
            sys.exit(0 if healthy else 1)
            "; do
              sleep 5
            done
          '

      - name: Show service status
        if: always()
        run: docker compose ps

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=50

      - name: Cleanup
        if: always()
        run: docker compose down -v
