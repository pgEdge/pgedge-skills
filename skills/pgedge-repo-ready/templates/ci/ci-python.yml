name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "<PYTHON_VERSION>"

      - name: Install dependencies
        run: pip install ruff interrogate

      - name: Check formatting
        run: ruff format --check .

      - name: Run linter
        run: ruff check .

      - name: Check docstring coverage
        run: interrogate -v --fail-under 80 .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "<PYTHON_VERSION>"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null \
            || pip install -r requirements.txt
          pip install pyright

      - name: Run pyright
        run: pyright --pythonversion <PYTHON_VERSION>

  test:
    name: Test (Python ${{ matrix.python }}, PG ${{ matrix.pg }})
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    strategy:
      matrix:
        python: <PYTHON_VERSIONS>
        pg: <PG_VERSIONS>

    services:
      postgres:
        image: ghcr.io/pgedge/pgedge-postgres:${{ matrix.pg }}-spock5-standard
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null \
            || pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest --cov --cov-report=term-missing -v

      - name: Check coverage threshold
        run: pytest --cov --cov-fail-under=75
