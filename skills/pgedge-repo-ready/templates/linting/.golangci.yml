version: "2"

linters:
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

issues:
  exclude-dirs:
    - vendor
    - third_party

  exclude-rules:
    - path: "_test\\.go"
      linters:
        - gosec
