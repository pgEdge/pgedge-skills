apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "<BINARY_NAME>.fullname" . }}-test"
  annotations: { "helm.sh/hook": test }
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command:
        - sh
        - -c
        - "curl -fsS http://{{ include "<BINARY_NAME>.fullname" . }}:{{ .Values.service.port }}/health"
