apiVersion: v1
kind: Service
metadata:
  name: {{ include "<BINARY_NAME>.fullname" . }}
  labels: {{- include "<BINARY_NAME>.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector: {{- include "<BINARY_NAME>.selectorLabels" . | nindent 4 }}
